<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Screening Undo</title>
  <!-- Gold gradient matches the project's --gold-gradient token -->
  <defs>
    <linearGradient id="pin-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6b34a"/>
      <stop offset="50%" stop-color="#b78b3a"/>
      <stop offset="100%" stop-color="#8e6526"/>
    </linearGradient>
  </defs>
  <!-- Location pin body — same silhouette as the LocationPinIcon used across the app -->
  <path
    d="M32 4 C18.7 4 8 14.7 8 28 c0 17.5 24 32 24 32 s24 -14.5 24 -32 c0 -13.3 -10.7 -24 -24 -24 z"
    fill="url(#pin-gold)"
    stroke="#111111"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- White inner disc that holds the football -->
  <circle cx="32" cy="26" r="13" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <!-- Mini football inside (classic black-and-white pattern, simplified) -->
  <!-- Center pentagon -->
  <polygon points="32,20 37,23.6 35.1,29.5 28.9,29.5 27,23.6" fill="#111111"/>
  <!-- Five seams radiating from the pentagon -->
  <g stroke="#444444" stroke-width="0.8" stroke-linecap="round">
    <line x1="32" y1="20" x2="32" y2="14"/>
    <line x1="37" y1="23.6" x2="42" y2="22"/>
    <line x1="35.1" y1="29.5" x2="39" y2="34"/>
    <line x1="28.9" y1="29.5" x2="25" y2="34"/>
    <line x1="27" y1="23.6" x2="22" y2="22"/>
  </g>
  <!-- Five small black rim pentagons -->
  <circle cx="32" cy="14" r="1.6" fill="#111111"/>
  <circle cx="42" cy="22" r="1.6" fill="#111111"/>
  <circle cx="39" cy="34" r="1.6" fill="#111111"/>
  <circle cx="25" cy="34" r="1.6" fill="#111111"/>
  <circle cx="22" cy="22" r="1.6" fill="#111111"/>
</svg>
